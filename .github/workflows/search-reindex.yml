      #       "https://www.googleapis.com/webmasters/v3/sites/${site_url_encoded}/sitemaps/${sitemap_url_encoded}"

      - name: Submit sitemap to Bing Webmaster
        env:
          BING_WEBMASTER_API_KEY: ${{ secrets.BING_WEBMASTER_API_KEY }}
        run: |
          site_url_encoded="$(node -p "encodeURIComponent(process.env.SITE_URL)")"
          sitemap_url_encoded="$(node -p "encodeURIComponent(process.env.SITEMAP_URL)")"

          curl --fail --silent --show-error \
            "https://ssl.bing.com/webmaster/api.svc/json/SubmitSiteMap?apikey=${BING_WEBMASTER_API_KEY}&siteUrl=${site_url_encoded}&siteMap=${sitemap_url_encoded}"
