      #   run: |
      #     site_url_encoded="$(node -p "encodeURIComponent(process.env.SITE_URL)")"
      #     sitemap_url_encoded="$(node -p "encodeURIComponent(process.env.SITEMAP_URL)")"

      #     curl --fail --silent --show-error \
