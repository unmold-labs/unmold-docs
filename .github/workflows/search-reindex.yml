name: Search Reindex

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: unmold-docs-search-reindex
  cancel-in-progress: false

env:
  SITE_URL: https://unmold.dev
  SITEMAP_URL: https://unmold.dev/sitemap.xml

jobs:
  reindex:
    runs-on: ubuntu-latest
    steps:
